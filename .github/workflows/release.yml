name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact npm version to publish, for example 0.9.0-beta.8"
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag to publish with"
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest
      promote_to_latest:
        description: "Also move the latest dist-tag to this version"
        required: true
        default: false
        type: boolean
      release_notes:
        description: "Markdown notes for CHANGELOG.md and the GitHub release"
        required: false
        default: "- Maintenance release."
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    env:
      RELEASE_VERSION: ${{ inputs.version }}
      NPM_TAG: ${{ inputs.npm_tag }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Validate release input
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $RELEASE_VERSION" >&2
            exit 1
          fi
          if git ls-remote --tags origin "v$RELEASE_VERSION" | grep -q .; then
            echo "Tag v$RELEASE_VERSION already exists." >&2
            exit 1
          fi
          if npm view "@canblmz1/dbsnap-core@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "@canblmz1/dbsnap-core@$RELEASE_VERSION is already published." >&2
            exit 1
          fi
          if npm view "@canblmz1/dbsnap@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "@canblmz1/dbsnap@$RELEASE_VERSION is already published." >&2
            exit 1
          fi

      - name: Verify npm authentication
        run: npm whoami

      - name: Bump package versions
        run: node scripts/bump-version.mjs "$RELEASE_VERSION"

      - name: Refresh lockfile
        run: pnpm install --lockfile-only

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack smoke
        run: pnpm pack:smoke

      - name: Commit release version
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/core/package.json packages/cli/package.json packages/core/src/snapshots/metadata.ts pnpm-lock.yaml CHANGELOG.md
          git commit -m "Release v$RELEASE_VERSION"
          git tag "v$RELEASE_VERSION"
          git push origin HEAD:main --follow-tags

      - name: Publish core package
        working-directory: packages/core
        run: npm publish --access public --tag "$NPM_TAG"

      - name: Publish CLI package
        working-directory: packages/cli
        run: npm publish --access public --tag "$NPM_TAG"

      - name: Promote latest dist-tag
        if: inputs.promote_to_latest
        run: |
          npm dist-tag add "@canblmz1/dbsnap-core@$RELEASE_VERSION" latest
          npm dist-tag add "@canblmz1/dbsnap@$RELEASE_VERSION" latest

      - name: Wait for npm registry
        run: |
          set -euo pipefail
          for i in {1..12}; do
            CORE_VERSION="$(npm view "@canblmz1/dbsnap-core@$RELEASE_VERSION" version 2>/dev/null || true)"
            CLI_VERSION="$(npm view "@canblmz1/dbsnap@$RELEASE_VERSION" version 2>/dev/null || true)"
            if [[ "$CORE_VERSION" == "$RELEASE_VERSION" && "$CLI_VERSION" == "$RELEASE_VERSION" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for npm registry to expose $RELEASE_VERSION." >&2
          exit 1

      - name: Published package smoke test
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          cd "$smoke_dir"
          npm init -y
          npm install -D "@canblmz1/dbsnap@$NPM_TAG"
          test "$(npx dbsnap --version)" = "$RELEASE_VERSION"
          npx dbsnap --help
          npx dbsnap init --dry-run
          npx dbsnap list --json
          npx dbsnap prune --help
          npx dbsnap verify --help

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf "%s\n" "$RELEASE_NOTES" > release-notes.md
          prerelease_flag=""
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "v$RELEASE_VERSION" \
            --target main \
            --title "v$RELEASE_VERSION" \
            $prerelease_flag \
            --notes-file release-notes.md
